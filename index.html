<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dhanush Hebbar | Portfolio</title>
    
   <!-- Minimalist Pulsing DH Favicon Script -->
    <script>
      (function animateFavicon() {
        const canvas = document.createElement('canvas');
        canvas.width = 32;
        canvas.height = 32;
        const ctx = canvas.getContext('2d');

        let link = document.querySelector("link[rel~='icon']");
        if (!link) {
          link = document.createElement('link');
          link.rel = 'icon';
          document.head.appendChild(link);
        }

        let scale = 1;
        let growing = true;

        setInterval(() => {
          // 1. Clear background (transparent)
          ctx.clearRect(0, 0, 32, 32);

          // 2. Calculate pulse scale (between 0.8 and 1.0)
          if (growing) scale += 0.02; else scale -= 0.02;
          if (scale >= 1.0) growing = false;
          if (scale <= 0.8) growing = true;

          // 3. Draw "DH" with a pulse effect
          ctx.font = 'bold 18px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = '#f8fafc'; // Clean white/slate
          
          ctx.save();
          ctx.translate(16, 16);
          ctx.scale(scale, scale);
          ctx.fillText('DH', 0, 2);
          ctx.restore();

          link.href = canvas.toDataURL('image/png');
        }, 80); 
      })();
    </script>
  </head>
  <body class="bg-slate-950 text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
